<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚の群れ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import { forceSimulation, forceCollide, forceManyBody } from 'https://cdn.jsdelivr.net/npm/d3-force@3/+esm';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CHARS = ['さ','か','な','う','み','い','わ','し','た','こ','く','も','め','ぬ','ね','は','ほ','ま','や','よ','る','れ','ろ','を','ん'];
const N = 25;
const HERO = 0; // index of protagonist

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => {
  resize();
  nodes.forEach(n => {
    n.x = Math.max(40, Math.min(W - 40, n.x));
    n.y = Math.max(40, Math.min(H - 40, n.y));
  });
});

// --- nodes ---
const nodes = Array.from({ length: N }, (_, i) => ({
  id: i,
  x: W / 2 + (Math.random() - 0.5) * 200,
  y: H / 2 + (Math.random() - 0.5) * 200,
  vx: (Math.random() - 0.5) * 1.5,
  vy: (Math.random() - 0.5) * 1.5,
  char: CHARS[i % CHARS.length],
  angle: Math.random() * Math.PI * 2,
}));

// Flock center wanders around the screen
const flock = { x: W / 2, y: H / 2, vx: 0.4, vy: 0.25 };

function updateFlockCenter() {
  flock.x += flock.vx;
  flock.y += flock.vy;
  if (flock.x < 120 || flock.x > W - 120) flock.vx *= -1;
  if (flock.y < 120 || flock.y > H - 120) flock.vy *= -1;
  // gentle random nudge
  flock.vx += (Math.random() - 0.5) * 0.05;
  flock.vy += (Math.random() - 0.5) * 0.05;
  const spd = Math.hypot(flock.vx, flock.vy);
  if (spd > 0.8) { flock.vx /= spd / 0.8; flock.vy /= spd / 0.8; }
}

// --- Boid parameters ---
const RADIUS = 80;      // neighborhood radius
const FONT_SIZE = 22;
const MAX_SPD = 2.5;

function clamp(v, max) {
  const s = Math.hypot(v.x, v.y);
  if (s > max) { v.x = v.x / s * max; v.y = v.y / s * max; }
}

function cohesion(alpha) {
  for (const n of nodes) {
    // attract toward flock center
    const dx = flock.x - n.x;
    const dy = flock.y - n.y;
    n.vx += dx * 0.001 * alpha;
    n.vy += dy * 0.001 * alpha;
    // also toward local centroid
    let cx = 0, cy = 0, cnt = 0;
    for (const m of nodes) {
      if (m === n) continue;
      const dist = Math.hypot(m.x - n.x, m.y - n.y);
      if (dist < RADIUS) { cx += m.x; cy += m.y; cnt++; }
    }
    if (cnt > 0) {
      n.vx += (cx / cnt - n.x) * 0.002 * alpha;
      n.vy += (cy / cnt - n.y) * 0.002 * alpha;
    }
  }
}

function alignment(alpha) {
  for (const n of nodes) {
    let ax = 0, ay = 0, cnt = 0;
    for (const m of nodes) {
      if (m === n) continue;
      if (Math.hypot(m.x - n.x, m.y - n.y) < RADIUS) {
        ax += m.vx; ay += m.vy; cnt++;
      }
    }
    if (cnt > 0) {
      n.vx += (ax / cnt - n.vx) * 0.04 * alpha;
      n.vy += (ay / cnt - n.vy) * 0.04 * alpha;
    }
  }
}

function separation(alpha) {
  const MIN_DIST = 36;
  for (const n of nodes) {
    for (const m of nodes) {
      if (m === n) continue;
      const dx = n.x - m.x, dy = n.y - m.y;
      const dist = Math.hypot(dx, dy);
      if (dist < MIN_DIST && dist > 0) {
        const str = (MIN_DIST - dist) / MIN_DIST * 0.08 * alpha;
        n.vx += (dx / dist) * str;
        n.vy += (dy / dist) * str;
      }
    }
  }
}

function boundary() {
  const margin = 60;
  for (const n of nodes) {
    if (n.x < margin)     n.vx += 0.15;
    if (n.x > W - margin) n.vx -= 0.15;
    if (n.y < margin)     n.vy += 0.15;
    if (n.y > H - margin) n.vy -= 0.15;
  }
}

// d3-force simulation (handles collide)
const sim = forceSimulation(nodes)
  .alphaDecay(0)
  .velocityDecay(0.05)
  .force('collide', forceCollide(FONT_SIZE * 0.9).strength(0.7))
  .on('tick', () => {});

// We manually drive boid forces each frame
function tick() {
  updateFlockCenter();
  const alpha = sim.alpha();
  cohesion(alpha);
  alignment(alpha);
  separation(alpha);
  boundary();

  // cap speed
  for (const n of nodes) {
    clamp({ x: n.vx, y: n.vy }, MAX_SPD);
    // update angle toward velocity
    if (Math.hypot(n.vx, n.vy) > 0.1) {
      const target = Math.atan2(n.vy, n.vx);
      let diff = target - n.angle;
      while (diff > Math.PI)  diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      n.angle += diff * 0.15;
    }
  }
}

// --- gradient background ---
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#001a33');
  grad.addColorStop(0.5, '#002b55');
  grad.addColorStop(1,   '#003366');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // subtle caustics-like shimmer
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 6; i++) {
    const r = 80 + i * 40;
    const cx = W * 0.3 + Math.sin(Date.now() * 0.0003 + i) * 60;
    const cy = H * 0.4 + Math.cos(Date.now() * 0.0004 + i) * 40;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, '#7ad');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

function drawFish(n) {
  const isHero = n.id === HERO;
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.rotate(n.angle + Math.PI / 2); // text reads upward = fish faces direction of travel

  ctx.font = `bold ${FONT_SIZE}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (isHero) {
    ctx.shadowColor = '#ff6a00';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ff6a00';
  } else {
    ctx.shadowColor = 'rgba(100,200,255,0.5)';
    ctx.shadowBlur = 6;
    ctx.fillStyle = `hsl(190,70%,${65 + Math.sin(n.id) * 10}%)`;
  }
  ctx.fillText(n.char, 0, 0);
  ctx.restore();
}

function frame() {
  sim.tick();
  tick();

  drawBackground();
  for (const n of nodes) drawFish(n);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
