<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚の群れ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #toggle {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,30,60,0.75);
    color: #7ad;
    border: 1px solid rgba(100,200,255,0.35);
    border-radius: 24px;
    padding: 10px 28px;
    font-size: 15px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    user-select: none;
    z-index: 10;
    touch-action: manipulation;
    transition: background 0.2s;
  }
  #toggle:hover { background: rgba(0,50,100,0.85); }
  #toggle.flee { color: #f88; border-color: rgba(255,120,120,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="toggle">👆 追従モード</button>
<script type="module">
import { prepareWithSegments, layoutWithLines } from '@chenglou/pretext';
import { forceSimulation, forceCollide } from 'd3-force';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const toggleBtn = document.getElementById('toggle');

const FONT_SIZE = 22;
const FONT = `bold ${FONT_SIZE}px sans-serif`;
const LINE_HEIGHT = FONT_SIZE * 1.4;

const CHARS = ['さ','か','な','う','み','い','わ','し','た','こ','く','も','め','ぬ','ね','は','ほ','ま','や','よ','る','れ','ろ','を','ん'];
const N = 25;
const HERO_ID = 0;

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();

// --- pretext: 各文字の描画幅を事前計測 ---
const charMeasures = {};
for (const ch of new Set(CHARS)) {
  const prep = prepareWithSegments(ch, FONT);
  const { lines } = layoutWithLines(prep, Infinity, LINE_HEIGHT);
  const w = lines[0]?.width ?? FONT_SIZE;
  charMeasures[ch] = { width: w, radius: Math.max(w, FONT_SIZE) / 2 + 4 };
}

// --- ノード生成 ---
const nodes = Array.from({ length: N }, (_, i) => {
  const char = CHARS[i % CHARS.length];
  return {
    id: i,
    x: W / 2 + (Math.random() - 0.5) * 200,
    y: H / 2 + (Math.random() - 0.5) * 200,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 0.5) * 1.5,
    char,
    radius: charMeasures[char].radius,
    charWidth: charMeasures[char].width,
    angle: Math.random() * Math.PI * 2,
  };
});

// --- タッチ操作状態 ---
let pointer = null; // { x, y } | null — タップで設定、次のタップで更新
let mode = 'follow'; // 'follow' | 'flee'

canvas.addEventListener('pointerdown', e => {
  pointer = { x: e.clientX, y: e.clientY };
});

toggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  mode = mode === 'follow' ? 'flee' : 'follow';
  toggleBtn.textContent = mode === 'follow' ? '👆 追従モード' : '🏃 逃走モード';
  toggleBtn.classList.toggle('flee', mode === 'flee');
});

// --- 群れの中心（画面内を回遊、追従モード時はポインタへ向かう） ---
const flock = { x: W / 2, y: H / 2, vx: 0.45, vy: 0.28 };

function updateFlockCenter() {
  if (pointer && mode === 'follow') {
    // フロック中心をポインタに向けて滑らかに移動
    flock.x += (pointer.x - flock.x) * 0.035;
    flock.y += (pointer.y - flock.y) * 0.035;
    return;
  }
  // 通常の回遊
  flock.x += flock.vx;
  flock.y += flock.vy;
  if (flock.x < 140 || flock.x > W - 140) flock.vx *= -1;
  if (flock.y < 120 || flock.y > H - 120) flock.vy *= -1;
  flock.vx += (Math.random() - 0.5) * 0.06;
  flock.vy += (Math.random() - 0.5) * 0.06;
  const spd = Math.hypot(flock.vx, flock.vy);
  if (spd > 0.85) { flock.vx = flock.vx / spd * 0.85; flock.vy = flock.vy / spd * 0.85; }
}

// --- 逃走モード: ポインタから各魚を反発 ---
function applyFlee(alpha) {
  if (!pointer || mode !== 'flee') return;
  const FLEE_R = 260;
  for (const n of nodes) {
    const dx = n.x - pointer.x;
    const dy = n.y - pointer.y;
    const dist = Math.hypot(dx, dy);
    if (dist < FLEE_R && dist > 0) {
      const str = Math.pow((FLEE_R - dist) / FLEE_R, 1.5) * 0.22 * alpha;
      n.vx += (dx / dist) * str;
      n.vy += (dy / dist) * str;
    }
  }
}

// --- Boid パラメータ ---
const NEIGHBOR_R = 90;
const MAX_SPD = 2.4;

function cohesion(alpha) {
  for (const n of nodes) {
    n.vx += (flock.x - n.x) * 0.0008 * alpha;
    n.vy += (flock.y - n.y) * 0.0008 * alpha;
    let cx = 0, cy = 0, cnt = 0;
    for (const m of nodes) {
      if (m === n) continue;
      if (Math.hypot(m.x - n.x, m.y - n.y) < NEIGHBOR_R) { cx += m.x; cy += m.y; cnt++; }
    }
    if (cnt > 0) {
      n.vx += (cx / cnt - n.x) * 0.002 * alpha;
      n.vy += (cy / cnt - n.y) * 0.002 * alpha;
    }
  }
}

function alignment(alpha) {
  for (const n of nodes) {
    let ax = 0, ay = 0, cnt = 0;
    for (const m of nodes) {
      if (m === n) continue;
      if (Math.hypot(m.x - n.x, m.y - n.y) < NEIGHBOR_R) { ax += m.vx; ay += m.vy; cnt++; }
    }
    if (cnt > 0) {
      n.vx += (ax / cnt - n.vx) * 0.04 * alpha;
      n.vy += (ay / cnt - n.vy) * 0.04 * alpha;
    }
  }
}

function separation(alpha) {
  for (const n of nodes) {
    for (const m of nodes) {
      if (m === n) continue;
      const dx = n.x - m.x, dy = n.y - m.y;
      const minDist = n.radius + m.radius;
      const dist = Math.hypot(dx, dy);
      if (dist < minDist && dist > 0) {
        const str = (minDist - dist) / minDist * 0.12 * alpha;
        n.vx += (dx / dist) * str;
        n.vy += (dy / dist) * str;
      }
    }
  }
}

function boundary() {
  const m = 70;
  for (const n of nodes) {
    if (n.x < m)     n.vx += 0.25;
    if (n.x > W - m) n.vx -= 0.25;
    if (n.y < m)     n.vy += 0.25;
    if (n.y > H - m) n.vy -= 0.25;
  }
}

const sim = forceSimulation(nodes)
  .alphaDecay(0)
  .velocityDecay(0.05)
  .force('collide', forceCollide(n => n.radius).strength(0.75))
  .on('tick', () => {});

function boidTick() {
  updateFlockCenter();
  const alpha = sim.alpha();
  cohesion(alpha);
  alignment(alpha);
  separation(alpha);
  applyFlee(alpha);
  boundary();

  for (const n of nodes) {
    const spd = Math.hypot(n.vx, n.vy);
    if (spd > MAX_SPD) { n.vx = n.vx / spd * MAX_SPD; n.vy = n.vy / spd * MAX_SPD; }
    if (spd > 0.08) {
      const target = Math.atan2(n.vy, n.vx);
      let diff = target - n.angle;
      while (diff >  Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      n.angle += diff * 0.14;
    }
  }
}

// --- 描画 ---
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#001428');
  grad.addColorStop(0.5, '#00244a');
  grad.addColorStop(1,   '#002e5c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalAlpha = 0.025;
  const t = Date.now();
  for (let i = 0; i < 5; i++) {
    const r = 90 + i * 55;
    const cx = W * 0.35 + Math.sin(t * 0.00028 + i * 1.3) * 80;
    const cy = H * 0.38 + Math.cos(t * 0.00035 + i * 0.9) * 55;
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, '#6bc8e8');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

function drawPointer() {
  if (!pointer) return;
  const t = Date.now() * 0.004;
  const isFollow = mode === 'follow';
  const baseColor = isFollow ? '255,200,80' : '255,90,90';
  ctx.save();
  for (let i = 0; i < 3; i++) {
    const r = 6 + i * 14 + Math.sin(t + i * 1.2) * 3;
    const alpha = 0.55 - i * 0.15;
    ctx.beginPath();
    ctx.arc(pointer.x, pointer.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${baseColor},${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  // 中心点
  ctx.beginPath();
  ctx.arc(pointer.x, pointer.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${baseColor},0.9)`;
  ctx.fill();
  ctx.restore();
}

function drawFish(n) {
  const isHero = n.id === HERO_ID;
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.rotate(n.angle + Math.PI / 2);
  ctx.font = FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (isHero) {
    ctx.shadowColor = '#ff6a00';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#ff7a10';
  } else {
    ctx.shadowColor = 'rgba(80,190,255,0.45)';
    ctx.shadowBlur = 7;
    ctx.fillStyle = `hsl(190,65%,${62 + Math.sin(n.id * 1.7) * 10}%)`;
  }
  ctx.fillText(n.char, 0, 0);
  ctx.restore();
}

function frame() {
  sim.tick();
  boidTick();
  drawBackground();
  drawPointer();
  for (const n of nodes) drawFish(n);
  requestAnimationFrame(frame);
}

window.addEventListener('resize', () => {
  resize();
  nodes.forEach(n => {
    n.x = Math.max(60, Math.min(W - 60, n.x));
    n.y = Math.max(60, Math.min(H - 60, n.y));
  });
});

requestAnimationFrame(frame);
</script>
</body>
</html>
