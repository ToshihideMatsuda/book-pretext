<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本棚</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
      color: #e8e4dc;
      height: 100vh;
      overflow: hidden;
    }
    body {
      font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", "HGS明朝E", serif;
    }
    button {
      font: inherit;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    .page-layer {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
      backface-visibility: hidden;
      will-change: transform;
    }
    .page-layer.page-hidden {
      visibility: hidden;
    }
    .line {
      position: absolute;
      white-space: pre;
      z-index: 1;
      color: #e8e4dc;
      user-select: text;
      -webkit-user-select: text;
    }
    .search-hit {
      background: rgb(255 220 64 / 0.58);
      color: #201a06;
      border-radius: 0.18em;
      box-shadow: 0 0 0 1px rgb(255 220 64 / 0.12);
    }
    .search-hit-active {
      background: rgb(255 177 56 / 0.82);
      color: #140d00;
    }
    .headline-line {
      position: absolute;
      white-space: pre;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      z-index: 2;
      user-select: text;
      -webkit-user-select: text;
    }
    .drop-cap {
      position: absolute;
      pointer-events: none;
      z-index: 2;
      font-weight: 700;
      color: #c4a35a;
    }
    .anim-out-fwd {
      animation: page-fold-out 0.65s cubic-bezier(0.45, 0, 0.55, 1) forwards;
      transform-origin: left center;
    }
    .anim-in-fwd {
      animation: page-spring-in-fwd 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .anim-out-bwd {
      animation: page-fold-out-bwd 0.65s cubic-bezier(0.45, 0, 0.55, 1) forwards;
      transform-origin: right center;
    }
    .anim-in-bwd {
      animation: page-spring-in-bwd 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes page-fold-out {
      0% { transform: perspective(1800px) rotateY(0deg); }
      100% { transform: perspective(1800px) rotateY(-175deg); }
    }
    @keyframes page-spring-in-fwd {
      0% { transform: perspective(1800px) rotateY(10deg) scale(0.97); opacity: 0.6; }
      100% { transform: perspective(1800px) rotateY(0deg) scale(1); opacity: 1; }
    }
    @keyframes page-fold-out-bwd {
      0% { transform: perspective(1800px) rotateY(0deg); }
      100% { transform: perspective(1800px) rotateY(175deg); }
    }
    @keyframes page-spring-in-bwd {
      0% { transform: perspective(1800px) rotateY(-10deg) scale(0.97); opacity: 0.6; }
      100% { transform: perspective(1800px) rotateY(0deg) scale(1); opacity: 1; }
    }
    .page-counter,
    .book-meta {
      position: fixed;
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      z-index: 100;
      white-space: nowrap;
      letter-spacing: 0.08em;
    }
    .page-counter {
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: rgb(255 255 255 / 0.3);
      pointer-events: none;
    }
    .book-meta {
      position: static;
      min-width: 0;
      color: rgb(255 255 255 / 0.86);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hint {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgb(255 255 255 / 0.18);
      z-index: 100;
      background: rgb(0 0 0 / 0.35);
      padding: 7px 16px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
    }
    .topbar {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: min(960px, calc(100vw - 24px));
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }
    .topbar-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      max-width: calc(100% - 120px);
      background: rgb(0 0 0 / 0.42);
      border: 1px solid rgb(255 255 255 / 0.12);
      border-radius: 999px;
      padding: 9px 12px;
      pointer-events: auto;
      box-shadow: 0 12px 30px rgb(0 0 0 / 0.25);
    }
    .icon-button,
    .search-button {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgb(255 255 255 / 0.12);
      background: rgb(255 255 255 / 0.04);
      color: rgb(255 255 255 / 0.82);
      border-radius: 999px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .icon-button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
    }
    .toolbar {
      position: static;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }
    .toolbar-button {
      border: 1px solid rgb(255 255 255 / 0.15);
      background: rgb(0 0 0 / 0.35);
      color: rgb(255 255 255 / 0.85);
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
    }
    .search-panel {
      position: fixed;
      top: 58px;
      left: 50%;
      transform: translateX(-50%);
      width: min(560px, calc(100vw - 24px));
      z-index: 130;
      display: none;
      background: #111319;
      border: 1px solid rgb(255 255 255 / 0.08);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 20px 50px rgb(0 0 0 / 0.35);
    }
    .search-panel.search-open {
      display: block;
    }
    .search-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .search-input {
      flex: 1 1 auto;
      min-width: 0;
      border: 1px solid rgb(255 255 255 / 0.1);
      background: rgb(255 255 255 / 0.04);
      color: #fff;
      border-radius: 999px;
      padding: 10px 14px;
      outline: none;
    }
    .search-input::placeholder {
      color: rgb(255 255 255 / 0.4);
    }
    .search-status {
      margin-top: 8px;
      min-height: 14px;
      color: rgb(255 255 255 / 0.5);
      font: 400 12px/1.2 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.04em;
    }
    .nav-prev, .nav-next {
      position: fixed;
      top: 0;
      height: 100%;
      width: 15%;
      z-index: 50;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
    }
    .nav-prev { left: 0; justify-content: flex-start; padding-left: 12px; }
    .nav-next { right: 0; justify-content: flex-end; padding-right: 12px; }
    .nav-prev:hover, .nav-next:hover { opacity: 1; }
    .nav-arrow {
      font-size: 28px;
      color: rgb(255 255 255 / 0.25);
      user-select: none;
    }
    .toc-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      background: rgb(5 5 8 / 0.78);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .toc-overlay.toc-open {
      display: flex;
    }
    .toc-panel {
      width: min(720px, 100%);
      max-height: min(80vh, 720px);
      overflow: auto;
      background: #111319;
      border: 1px solid rgb(255 255 255 / 0.08);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 60px rgb(0 0 0 / 0.45);
    }
    .toc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .toc-title {
      font-size: 22px;
      color: #fff;
    }
    .toc-actions {
      display: flex;
      gap: 8px;
    }
    .toc-list {
      display: grid;
      gap: 10px;
    }
    .toc-item {
      width: 100%;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid rgb(255 255 255 / 0.08);
      background: rgb(255 255 255 / 0.02);
      color: #e8e4dc;
      padding: 14px 16px;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
    }
    .toc-item strong {
      font-size: 18px;
      font-weight: 700;
    }
    .toc-item span {
      color: rgb(255 255 255 / 0.55);
      font-size: 13px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .toc-item-active {
      border-color: rgb(196 163 90 / 0.45);
      background: rgb(196 163 90 / 0.08);
    }
    .page-jump {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 40px;
      width: min(720px, calc(100vw - 32px));
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 115;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgb(0 0 0 / 0.42);
      border: 1px solid rgb(255 255 255 / 0.1);
      box-shadow: 0 14px 32px rgb(0 0 0 / 0.24);
    }
    .page-seek {
      flex: 1 1 auto;
      accent-color: #c4a35a;
    }
    .page-jump-label {
      min-width: 56px;
      text-align: right;
      color: rgb(255 255 255 / 0.7);
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.08em;
    }
    @media (max-width: 760px) {
      .hint { display: none; }
      .nav-prev, .nav-next { width: 30%; }
      .topbar {
        top: 10px;
        width: calc(100vw - 16px);
        gap: 8px;
      }
      .topbar-main {
        max-width: calc(100% - 74px);
        padding: 8px 10px;
      }
      .book-meta {
        font-size: 12px;
      }
      .search-panel {
        top: 54px;
        width: calc(100vw - 16px);
      }
      .page-jump {
        width: calc(100vw - 16px);
        bottom: 34px;
        padding: 10px 12px;
      }
      .page-jump-label {
        min-width: 48px;
      }
      .toc-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="hint">← 前のページ &middot; 次のページ →</div>
  <div class="topbar">
    <div class="topbar-main">
      <div class="book-meta" id="book-meta"></div>
      <button class="icon-button" id="search-toggle" type="button" aria-label="検索">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="6.5"></circle>
          <path d="M16 16L21 21"></path>
        </svg>
      </button>
    </div>
    <div class="toolbar">
      <button class="toolbar-button" id="toc-toggle" type="button">目次</button>
    </div>
  </div>
  <div class="search-panel" id="search-panel">
    <div class="search-row">
      <input class="search-input" id="search-input" type="search" placeholder="この本を検索">
      <button class="toolbar-button" id="search-submit" type="button">検索</button>
      <button class="toolbar-button" id="search-prev" type="button">前</button>
      <button class="toolbar-button" id="search-next" type="button">次</button>
      <button class="toolbar-button" id="search-close" type="button">閉じる</button>
    </div>
    <div class="search-status" id="search-status"></div>
  </div>
  <div class="nav-prev" id="nav-prev"><span class="nav-arrow">‹</span></div>
  <div class="nav-next" id="nav-next"><span class="nav-arrow">›</span></div>
  <div class="page-jump" id="page-jump">
    <input class="page-seek" id="page-seek" type="range" min="1" max="1" value="1">
    <div class="page-jump-label" id="page-jump-label">1 / 1</div>
  </div>
  <div class="page-counter"><span id="page-num">1</span></div>
  <div class="toc-overlay" id="toc-overlay">
    <div class="toc-panel">
      <div class="toc-header">
        <div class="toc-title">目次</div>
        <div class="toc-actions">
          <button class="toolbar-button" id="toc-resume" type="button">戻る</button>
          <button class="toolbar-button" id="toc-close" type="button">閉じる</button>
        </div>
      </div>
      <div class="toc-list" id="toc-list"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
