<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>走れメロス — The Editorial Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
      color: #e8e4dc;
      height: 100vh;
      overflow: hidden;
    }
    body {
      font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", "HGS明朝E", serif;
    }
    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .page-layer {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
      backface-visibility: hidden;
      will-change: transform;
    }
    .page-layer.page-hidden {
      visibility: hidden;
    }
    .line {
      position: absolute;
      white-space: pre;
      z-index: 1;
      color: #e8e4dc;
      user-select: text;
      -webkit-user-select: text;
    }
    .headline-line {
      position: absolute;
      white-space: pre;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      z-index: 2;
      user-select: text;
      -webkit-user-select: text;
    }
    .drop-cap {
      position: absolute;
      pointer-events: none;
      z-index: 2;
      font-weight: 700;
      color: #c4a35a;
    }
    .anim-out-fwd {
      animation: page-fold-out 0.65s cubic-bezier(0.45, 0, 0.55, 1) forwards;
      transform-origin: left center;
    }
    .anim-in-fwd {
      animation: page-spring-in-fwd 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .anim-out-bwd {
      animation: page-fold-out-bwd 0.65s cubic-bezier(0.45, 0, 0.55, 1) forwards;
      transform-origin: right center;
    }
    .anim-in-bwd {
      animation: page-spring-in-bwd 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes page-fold-out {
      0% { transform: perspective(1800px) rotateY(0deg); }
      100% { transform: perspective(1800px) rotateY(-175deg); }
    }
    @keyframes page-spring-in-fwd {
      0% { transform: perspective(1800px) rotateY(10deg) scale(0.97); opacity: 0.6; }
      100% { transform: perspective(1800px) rotateY(0deg) scale(1); opacity: 1; }
    }
    @keyframes page-fold-out-bwd {
      0% { transform: perspective(1800px) rotateY(0deg); }
      100% { transform: perspective(1800px) rotateY(175deg); }
    }
    @keyframes page-spring-in-bwd {
      0% { transform: perspective(1800px) rotateY(-10deg) scale(0.97); opacity: 0.6; }
      100% { transform: perspective(1800px) rotateY(0deg) scale(1); opacity: 1; }
    }
    .page-counter {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgb(255 255 255 / 0.3);
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.08em;
    }
    .hint {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font: 400 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgb(255 255 255 / 0.18);
      z-index: 100;
      background: rgb(0 0 0 / 0.35);
      padding: 7px 16px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
    }
    .nav-prev, .nav-next {
      position: fixed;
      top: 0;
      height: 100%;
      width: 15%;
      z-index: 50;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
    }
    .nav-prev { left: 0; justify-content: flex-start; padding-left: 12px; }
    .nav-next { right: 0; justify-content: flex-end; padding-right: 12px; }
    .nav-prev:hover, .nav-next:hover { opacity: 1; }
    .nav-arrow {
      font-size: 28px;
      color: rgb(255 255 255 / 0.25);
      user-select: none;
    }
    @media (max-width: 760px) {
      .hint { display: none; }
      .nav-prev, .nav-next { width: 30%; }
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="hint">← 前のページ &middot; 次のページ →</div>
  <div class="nav-prev" id="nav-prev"><span class="nav-arrow">‹</span></div>
  <div class="nav-next" id="nav-next"><span class="nav-arrow">›</span></div>
  <div class="page-counter"><span id="page-num">1</span></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
